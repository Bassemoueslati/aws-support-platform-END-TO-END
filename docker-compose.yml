services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: aws-supportdesk-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: aws-supportdesk-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

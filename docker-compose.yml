services:
  db:
    image: postgres:15
    container_name: supportdesk-db
    environment:
      POSTGRES_DB: supportdesk_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: aws-insightops-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=supportdesk_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: aws-insightops-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
